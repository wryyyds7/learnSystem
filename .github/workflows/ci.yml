name: Java CI/CD Pipeline
author: LearnSystem Team
description: |
  在线学习系统 CI/CD 流水线
  - 自动构建项目
  - 运行单元测试
  - 打包 WAR 文件
  - 部署到生产环境
branding:
  icon: 'book-open'
  color: 'blue'

env:
  PROJECT_NAME: learnSystem
  PROJECT_VERSION: '1.0.0'
  AUTHOR_NAME: 'LearnSystem Dev Team'
  AUTHOR_EMAIL: 'dev@learnsystem.com'
  BUILD_DATE: ${{ formatDateTime(utcNow(), 'yyyy-MM-dd HH:mm:ss') }}
  JAVA_VERSION: '11'

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.set_version.outputs.build_version }}
      git_commit: ${{ steps.git_info.outputs.git_commit }}
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - name: Get Git information
      id: git_info
      run: |
        echo "git_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "git_branch=$(git branch --show-current)" >> $GITHUB_OUTPUT
        echo "git_author=$(git log -1 --format='%an')" >> $GITHUB_OUTPUT
        echo "git_email=$(git log -1 --format='%ae')" >> $GITHUB_OUTPUT

    - name: Set build version
      id: set_version
      run: |
        BUILD_VERSION="${{ env.PROJECT_VERSION }}-build-${{ github.run_number }}-${{ steps.git_info.outputs.git_commit }}"
        echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV

    - name: Print build information
      run: |
        echo "=========================================="
        echo "           Build Information"
        echo "=========================================="
        echo "项目名称: ${{ env.PROJECT_NAME }}"
        echo "项目版本: ${{ env.PROJECT_VERSION }}"
        echo "构建版本: ${{ env.BUILD_VERSION }}"
        echo "构建日期: "
        echo "Git 分支: ${{ steps.git_info.outputs.git_branch }}"
        echo "Git 提交: ${{ steps.git_info.outputs.git_commit }}"
        echo "提交作者: wry"
        echo "触发事件: ${{ github.event_name }}"
        echo "触发分支: ${{ github.ref_name }}"
        echo "工作流ID: ${{ github.run_id }}"
        echo "运行编号: ${{ github.run_number }}"
        echo "=========================================="

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean package -DskipTests -Dproject.version=${{ env.BUILD_VERSION }}

    - name: Run tests
      run: mvn -B test

    - name: Archive build artifact with metadata
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-war
        path: target/${{ env.PROJECT_NAME }}.war
        retention-days: 30
        if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-war

    - name: Print deployment information
      run: |
        echo "=========================================="
        echo "        Deployment Information"
        echo "=========================================="
        echo "项目名称: ${{ env.PROJECT_NAME }}"
        echo "构建版本: ${{ needs.build.outputs.build_version }}"
        echo "Git 提交: ${{ needs.build.outputs.git_commit }}"
        echo "作者团队: ${{ env.AUTHOR_NAME }}"
        echo "部署日期: ${{ env.BUILD_DATE }}"
        echo "=========================================="

    - name: Deploy to server
      run: |
        echo "Deploying ${{ env.PROJECT_NAME }}.war to production server"
        echo "Version: ${{ needs.build.outputs.build_version }}"
        echo "Author: ${{ env.AUTHOR_NAME }}"
